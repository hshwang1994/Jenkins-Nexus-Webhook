# ============================================================
# reconcile_sync_state.yml — 주기 점검 (partial / full)
#
# partial: 최근 변경분 + 최근 실패분 + 신규 OOB catch-up
# full:    전체 asset 비교 + quarantine 최종 삭제
#
# Nexus 기대 상태 기준으로 대표 OOB 를 완성한 뒤
# rsync 로 peer 에 전파한다.
# ============================================================
- name: 주기 점검 오케스트레이션
  hosts: localhost
  gather_facts: false
  connection: local
  vars_files: [ ../group_vars/all.yml ]
  vars:
    mode: "{{ event_payload.mode | default('partial') }}"
    nexus_search_api: "{{ sync_cfg.nexus.base_url }}/service/rest/v1/search/assets"
    # 최근 실패 기록 파일 (JSON list)
    failure_log_path: "/var/lib/oob-sync/recent_failures.json"

  tasks:
    - name: 시작 로그
      debug:
        msg: >-
          [주기 점검 시작] mode={{ mode }} location={{ location_code }}
          seed={{ selected_seed_node }} peers={{ selected_peer_nodes }}

    # ===========================================================
    # 1. Nexus 기준 asset 목록 조회
    # ===========================================================
    - name: 동기화 대상 repository 설정 확인
      when: sync_cfg.nexus.allowed_repositories | length == 0
      fail:
        msg: |
          [동기화 대상 repository 미설정]
          발생상황: sync_config.yml 의 nexus.allowed_repositories 가 비어 있습니다.
          원인: 구현 시 동기화 대상 repository 이름을 등록하지 않았습니다.
          문제: 주기 점검이 Nexus 기대 상태를 조회할 수 없습니다.
          조치방법: sync_config.yml 의 nexus.allowed_repositories 에 대상 repository 이름을 등록합니다.

    - name: Nexus asset 목록 조회 (list_nexus_assets.py)
      shell: |
        python3 {{ playbook_dir }}/../scripts/list_nexus_assets.py \
          --nexus-url "{{ sync_cfg.nexus.base_url }}" \
          --repository "{{ _repo }}" \
          --mode "{{ mode }}"
      register: _nexus_query
      changed_when: false
      loop: "{{ sync_cfg.nexus.allowed_repositories }}"
      loop_control: { loop_var: _repo }

    - name: Nexus 상대경로 세트 파싱
      set_fact:
        nexus_relative_paths: >-
          {{ _nexus_query.results
             | map(attribute='stdout')
             | map('from_json')
             | flatten
             | map(attribute='path')
             | list }}

    # ===========================================================
    # 2. 로컬 파일 목록 수집
    # ===========================================================
    - name: 로컬 파일 목록 수집
      find:
        paths: "{{ sync_cfg.sync_root_path }}"
        recurse: true
        file_type: file
      register: _local_find

    - name: 로컬 상대경로 세트 생성
      set_fact:
        local_relative_paths: >-
          {{ _local_find.files
             | map(attribute='path')
             | map('regex_replace', '^' ~ sync_cfg.sync_root_path ~ '/', '')
             | list }}

    # ===========================================================
    # 3. 최근 실패분 로드 (부분 점검 시)
    # ===========================================================
    - name: 최근 실패 기록 확인
      stat: { path: "{{ failure_log_path }}" }
      register: _failure_stat

    - name: 최근 실패분 로드
      when: mode == 'partial' and _failure_stat.stat.exists
      slurp: { src: "{{ failure_log_path }}" }
      register: _failure_raw

    - name: 최근 실패분 파싱
      set_fact:
        recent_failure_paths: "{{ (_failure_raw.content | b64decode | from_json) if (mode == 'partial' and _failure_stat.stat.exists) else [] }}"

    # ===========================================================
    # 4. 누락 파일 계산 (Nexus 기준 - 로컬 + 최근 실패분)
    # ===========================================================
    - name: 누락 파일 계산
      set_fact:
        missing_paths: "{{ (nexus_relative_paths | difference(local_relative_paths)) | union(recent_failure_paths) | unique }}"

    - name: 누락 파일 재동기화 (대표 OOB 에이전트에 다운로드)
      when: missing_paths | length > 0
      include_tasks: download_from_nexus.yml
      loop: "{{ missing_paths }}"
      loop_control: { loop_var: _rel }
      vars:
        repository_name: "{{ _rel.split('/')[0] }}"
        asset_path: "{{ _rel.split('/')[1:] | join('/') }}"
        download_url: "{{ sync_cfg.nexus.base_url }}/repository/{{ _rel }}"
        final_relative_path: "{{ _rel }}"
        final_absolute_path: "{{ sync_cfg.sync_root_path }}/{{ _rel }}"
        temp_absolute_path:  "{{ sync_cfg.temp_root_path }}/{{ _rel }}.part"

    # ===========================================================
    # 5. 과잉 파일 (로컬에 있는데 Nexus 에 없음) → quarantine
    # ===========================================================
    - name: 과잉 파일 계산
      set_fact:
        orphan_paths: "{{ local_relative_paths | difference(nexus_relative_paths) }}"

    - name: 과잉 파일 quarantine 이동
      when: orphan_paths | length > 0
      loop: "{{ orphan_paths }}"
      loop_control: { loop_var: _rel }
      block:
        - file:
            path: "{{ sync_cfg.quarantine_root_path }}/{{ _rel | dirname }}"
            state: directory
            mode: '0750'
        - command: >-
            mv -f
            "{{ sync_cfg.sync_root_path }}/{{ _rel }}"
            "{{ sync_cfg.quarantine_root_path }}/{{ _rel }}"

    # ===========================================================
    # 6. quarantine 최종 삭제 (전체 점검에서만)
    # ===========================================================
    - name: quarantine 최종 삭제 (전체 점검에서만 실행)
      when: mode == 'full'
      shell: |
        find "{{ sync_cfg.quarantine_root_path }}" -type f -exec rm -f {} +
        find "{{ sync_cfg.quarantine_root_path }}" -type d -empty -delete
      changed_when: true

    # ===========================================================
    # 7. 대상 OOB 에이전트에 전파 (catch-up 포함)
    #
    # 대표 OOB 에이전트의 /sync/files 가 Nexus 기대 상태와 일치된 상태에서
    # rsync 로 각 peer 에 전파한다.
    # 신규 OOB Agent 는 /sync/files 가 비어 있으므로
    # 이 단계에서 모든 파일이 자동으로 복사된다.
    # ===========================================================
    - name: 대상 OOB 에이전트에 전파 (신규 노드 catch-up 포함)
      when: selected_peer_nodes | length > 0
      loop: "{{ selected_peer_nodes }}"
      loop_control: { loop_var: peer }
      command: >-
        rsync {{ sync_cfg.fanout.rsync_options }} --delete
              -e "ssh -i {{ lookup('env','OOB_SSH_KEY') }} -o StrictHostKeyChecking=no"
              "{{ sync_cfg.sync_root_path }}/"
              "{{ sync_cfg.fanout.ssh_user }}@{{ peer }}:{{ sync_cfg.sync_root_path }}/"
      register: _catchup
      ignore_errors: true

    - name: 전파 실패 노드 로그
      when: _catchup is defined and _catchup.results is defined
      set_fact:
        _catchup_fail_peers: "{{ _catchup.results | rejectattr('rc','equalto',0) | map(attribute='peer') | list }}"

    - name: 전파 실패 한글 로그
      when: _catchup_fail_peers is defined and _catchup_fail_peers | length > 0
      debug:
        msg: |
          [대상 OOB 에이전트 전파 실패]

          발생상황:
          주기 점검({{ mode }}) 과정에서 일부 대상 OOB 에이전트로의 rsync 전파가 실패했습니다.
          실패 노드: {{ _catchup_fail_peers }}

          원인:
          대상 노드의 디스크 부족, SSH 연결 실패, 파일 시스템 권한 문제 중 하나입니다.

          문제:
          실패한 노드는 최신 상태와 일치하지 않습니다.

          조치방법:
          1. 실패 노드의 디스크/SSH/권한 상태를 점검합니다.
          2. 다음 주기 점검에서 자동으로 재시도합니다.

    # ===========================================================
    # 8. 최근 실패 기록 초기화 (성공 시)
    # ===========================================================
    - name: 최근 실패 기록 초기화
      copy:
        content: "[]"
        dest: "{{ failure_log_path }}"
        mode: '0644'

    - name: 주기 점검 요약 로그
      debug:
        msg: >-
          [주기 점검 완료] mode={{ mode }} location={{ location_code }}
          누락={{ missing_paths | length }} 과잉={{ orphan_paths | length }}
          peer_전파={{ selected_peer_nodes }}
