# ============================================================
# OOB 파일 동기화 전용 ansible.cfg
# 실제 운영 Agent 의 /etc/ansible/ansible.cfg 가 inventory 스크립트,
# redis fact cache, winrm 등 공통 설정을 제공한다.
# 이 파일은 그 위에 동기화 전용 최소 override 만 얹는다.
# Jenkinsfile 은 ANSIBLE_CONFIG 를 강제로 지정하지 않는다.
# 필요 시 playbook 디렉터리에서 ansible-playbook 이 자동으로 찾도록
# 같은 디렉터리에 둔다.
# ============================================================
[defaults]
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
bin_ansible_callbacks = True
forks = 20
timeout = 60
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /var/tmp/ansible_fact_cache
fact_caching_timeout = 600

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
